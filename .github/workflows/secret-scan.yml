name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  issues: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secret scan
        id: trufflehog
        continue-on-error: true
        run: |
          # Install TruffleHog
          docker pull trufflesecurity/trufflehog:latest

          # Scan the diff introduced by this push (current commit vs parent)
          # For PRs, scan the full diff; for pushes, scan the latest commit
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            git file:///repo \
            --since-commit ${{ github.event.before || github.sha }}~1 \
            --fail \
            --no-update \
            --json > /tmp/trufflehog-results.json 2>&1 || true

          # Also do a full repo scan as a fallback to catch anything
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            git file:///repo \
            --only-verified \
            --fail \
            --no-update \
            --json > /tmp/trufflehog-verified.json 2>&1

          SCAN_EXIT_CODE=$?
          echo "exit_code=$SCAN_EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$SCAN_EXIT_CODE" -ne 0 ]; then
            echo "secrets_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare scan report
        if: steps.trufflehog.outputs.secrets_found == 'true'
        id: report
        run: |
          {
            echo 'report<<EOF'
            echo "## :rotating_light: Secret Scan Alert"
            echo ""
            echo "**TruffleHog detected verified secrets in this repository.**"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Pushed by** | @${{ github.actor }} |"
            echo "| **Workflow run** | [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "### What to do"
            echo "1. **Rotate the exposed credential immediately** — even if the commit is reverted, it may already be in logs or caches."
            echo "2. Review the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details on which secrets were found."
            echo "3. Remove the secret from the code and commit history (consider \`git filter-repo\` or BFG Repo-Cleaner)."
            echo "4. Close this issue once the secret has been rotated and removed."
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open GitHub Issue
        if: steps.trufflehog.outputs.secrets_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Secret detected in commit ${context.sha.substring(0, 7)} on ${context.ref.replace('refs/heads/', '')}`;

            // Check for an existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secret-leak',
              per_page: 10
            });

            const duplicate = existing.data.find(i =>
              i.title.includes(context.sha.substring(0, 7))
            );

            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number}`);
              return;
            }

            // Ensure the label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'secret-leak',
                color: 'd93f0b',
                description: 'A secret or credential was detected in the repository'
              });
            } catch (e) {
              // Label may already exist — that's fine
            }

            const body = process.env.REPORT;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['secret-leak']
            });
        env:
          REPORT: ${{ steps.report.outputs.report }}

      - name: Fail workflow if secrets found
        if: steps.trufflehog.outputs.secrets_found == 'true'
        run: |
          echo "::error::TruffleHog detected secrets in this repository. See the opened issue for details."
          exit 1
